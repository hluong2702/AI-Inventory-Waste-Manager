server:
  port: 8080

spring:
  config:
    import: optional:file:.env.local[.properties]
  application:
    name: inventory-ai-backend
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB
      file-size-threshold: 0
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_READ_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT_MS:5000}

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-}]"

app:
  business:
    time-zone: ${BUSINESS_TIME_ZONE:Asia/Ho_Chi_Minh}
  cache:
    namespace: ${CACHE_NAMESPACE}
    subscription-ttl: ${SUBSCRIPTION_CACHE_TTL:5m}
  frontend:
    login-url: ${FRONTEND_LOGIN_URL}
    invite-url: ${FRONTEND_INVITE_URL}
  invitation-email:
    enabled: ${INVITATION_EMAIL_ENABLED:true}
  network:
    client-ip:
      trusted-proxies: ${TRUSTED_PROXY_CIDRS:}
      max-header-length: ${CLIENT_IP_MAX_HEADER_LENGTH:4096}
      max-hops: ${CLIENT_IP_MAX_HOPS:16}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  auth:
    refresh-cookie:
      name: ${AUTH_REFRESH_COOKIE_NAME:inventoryai_refresh}
      secure: ${AUTH_REFRESH_COOKIE_SECURE:true}
      same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
      domain: ${AUTH_REFRESH_COOKIE_DOMAIN:}
    rate-limit:
      login-ip-max: ${AUTH_RATE_LOGIN_IP_MAX:50}
      login-account-max: ${AUTH_RATE_LOGIN_ACCOUNT_MAX:20}
      login-pair-max: ${AUTH_RATE_LOGIN_PAIR_MAX:8}
      login-window-minutes: ${AUTH_RATE_LOGIN_WINDOW_MINUTES:15}
      register-ip-max: ${AUTH_RATE_REGISTER_IP_MAX:10}
      register-email-max: ${AUTH_RATE_REGISTER_EMAIL_MAX:3}
      register-window-minutes: ${AUTH_RATE_REGISTER_WINDOW_MINUTES:60}
      register-email-window-minutes: ${AUTH_RATE_REGISTER_EMAIL_WINDOW_MINUTES:1440}
      refresh-ip-max: ${AUTH_RATE_REFRESH_IP_MAX:120}
      refresh-session-max: ${AUTH_RATE_REFRESH_SESSION_MAX:20}
      refresh-window-minutes: ${AUTH_RATE_REFRESH_WINDOW_MINUTES:15}
      fallback-max-keys: ${AUTH_RATE_FALLBACK_MAX_KEYS:20000}
  jwt:
    issuer: ${JWT_ISSUER:inventoryai.vn}
    audience: ${JWT_AUDIENCE:inventoryai-api}
    secret: ${JWT_SECRET}
    access-token-minutes: 15
    refresh-token-days: 14
  alerts:
    cron: ${ALERTS_CRON:0 15 2 * * *}
    zone: ${ALERTS_ZONE:${BUSINESS_TIME_ZONE:Asia/Ho_Chi_Minh}}
    expiring-days: ${ALERTS_EXPIRING_DAYS:3}
    store-page-size: ${ALERTS_STORE_PAGE_SIZE:100}
  payment:
    payos:
      enabled: ${PAYOS_ENABLED:false}
      client-id: ${PAYOS_CLIENT_ID:}
      api-key: ${PAYOS_API_KEY:}
      checksum-key: ${PAYOS_CHECKSUM_KEY:}
      return-url: ${PAYOS_RETURN_URL:}
      cancel-url: ${PAYOS_CANCEL_URL:}
      expire-minutes: ${PAYOS_EXPIRE_MINUTES:15}
  forecast:
    # URL đến Python Prophet microservice
    prophet-service-url: ${PROPHET_SERVICE_URL:http://localhost:8001}
    # Timeout (giây) — Prophet cần thời gian fit, đặt đủ lớn
    prophet-timeout-seconds: ${PROPHET_TIMEOUT_SECONDS:15}
    # Số ngày lịch sử dùng để train model (khuyến nghị 60–90)
    history-days: ${FORECAST_HISTORY_DAYS:90}

