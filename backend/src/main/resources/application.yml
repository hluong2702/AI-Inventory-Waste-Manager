server:
  port: 8080

spring:
  application:
    name: inventory-ai-backend
  datasource:
    url: jdbc:mysql://localhost:3306/inventory_ai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend:
    login-url: ${FRONTEND_LOGIN_URL:http://localhost:5173/login}
    invite-url: ${FRONTEND_INVITE_URL:http://localhost:5173/accept-invite}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  jwt:
    issuer: inventoryai.vn
    secret: "replace-with-at-least-32-bytes-production-secret"
    access-token-minutes: 30
    refresh-token-days: 14
  alerts:
    expiring-days: 3
