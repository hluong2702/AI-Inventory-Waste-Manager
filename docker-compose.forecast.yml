version: "3.9"

services:
  forecast-service:
    build:
      context: ./forecast-service
      dockerfile: Dockerfile
    container_name: inventoryai-forecast
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - LOG_LEVEL=INFO
      # Cho phép Spring Boot backend gọi vào
      - ALLOWED_ORIGINS=http://localhost:8080,http://backend:8080
      # Tắt reload trong production
      - RELOAD=false
      - WORKERS=2
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # Giới hạn tài nguyên (Prophet + pandas dùng nhiều RAM khi training)
    mem_limit: 1g
    cpus: "1.0"
